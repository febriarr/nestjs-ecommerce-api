# Infrastruktur lokal untuk development.
# Redis dipakai sebagai broker BullMQ (queue invoice: generate PDF + kirim email).
#
# Jalankan:   docker compose up -d
# Hentikan:   docker compose down
# Reset data: docker compose down -v
services:
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    # Port dapat di-override lewat .env (REDIS_PORT). Default 6379.
    ports:
      - '${REDIS_PORT:-6379}:6379'
    # Aktifkan AOF agar job queue tetap aman setelah restart container.
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
