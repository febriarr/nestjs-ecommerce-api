users:
  get:
    tags:
    - Users
    summary: List user (admin)
    description: 'Role: admin/super_admin. Filter role/status/search (nama/email).'
    parameters:
    - $ref: ../components/parameters.yaml#/Cursor
    - $ref: ../components/parameters.yaml#/Limit
    - name: role
      in: query
      schema:
        type: string
        enum:
        - super_admin
        - admin
        - customer
    - name: status
      in: query
      schema:
        type: string
        enum:
        - active
        - suspended
    - name: search
      in: query
      schema:
        type: string
    responses:
      '200':
        $ref: ../components/responses.yaml#/UserList
      default:
        $ref: ../components/responses.yaml#/Error
  post:
    tags:
    - Users
    summary: Buat user internal (admin, boleh set role)
    description: 'Role: admin/super_admin. Registrasi publik memakai /auth/register.'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - email
            - name
            - password
            properties:
              email:
                type: string
                format: email
              name:
                type: string
              password:
                type: string
                minLength: 8
              phone:
                type: string
              avatar:
                type: string
                format: uri
              role:
                type: string
                enum:
                - super_admin
                - admin
                - customer
    responses:
      '201':
        $ref: ../components/responses.yaml#/UserSingle
      default:
        $ref: ../components/responses.yaml#/Error
users-id:
  parameters:
  - $ref: ../components/parameters.yaml#/UserId
  get:
    tags:
    - Users
    summary: Detail user (diri sendiri, atau siapa pun bila admin)
    responses:
      '200':
        $ref: ../components/responses.yaml#/UserSingle
      default:
        $ref: ../components/responses.yaml#/Error
  patch:
    tags:
    - Users
    summary: Update profil (diri sendiri/admin; role & status hanya admin)
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              phone:
                type: string
              avatar:
                type: string
                format: uri
              role:
                type: string
                enum:
                - super_admin
                - admin
                - customer
              status:
                type: string
                enum:
                - active
                - suspended
              notificationPref:
                $ref: ../components/schemas/auth.yaml#/NotificationPref
    responses:
      '200':
        $ref: ../components/responses.yaml#/UserSingle
      default:
        $ref: ../components/responses.yaml#/Error
  delete:
    tags:
    - Users
    summary: Soft delete user (admin)
    responses:
      '200':
        description: Terhapus (soft delete)
      default:
        $ref: ../components/responses.yaml#/Error
users-id-password:
  patch:
    tags:
    - Users
    summary: Ganti password
    description: 'Diri sendiri wajib `currentPassword` (kecuali akun OAuth yang belum punya password).

      Admin boleh me-reset password user lain tanpa `currentPassword`.

      Salah → 422 `USER_INVALID_PASSWORD`.

      '
    parameters:
    - $ref: ../components/parameters.yaml#/UserId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - newPassword
            properties:
              currentPassword:
                type: string
              newPassword:
                type: string
                minLength: 8
    responses:
      '200':
        description: Password terganti
      default:
        $ref: ../components/responses.yaml#/Error
