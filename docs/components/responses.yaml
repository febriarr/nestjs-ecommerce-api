Error:
  description: 'Error terstruktur. Kode penting: 400 `VALIDATION_FAILED`/`IDEMPOTENCY_KEY_MISSING`,

    401 `AUTH_TOKEN_MISSING`/`AUTH_TOKEN_INVALID`/`AUTH_INVALID_CREDENTIALS`,

    403 `FORBIDDEN`/`USER_SUSPENDED`, 404 `*_NOT_FOUND`, 409 `*_CONFLICT`,

    422 `*_INSUFFICIENT`/`*_INVALID`/`ORDER_UNFULFILLABLE`, 429 `RATE_LIMIT_EXCEEDED`.

    '
  content:
    application/json:
      schema:
        $ref: ./schemas/common.yaml#/ErrorResponse
UserSingle:
  description: User
  content:
    application/json:
      schema:
        type: object
        properties:
          ok:
            type: boolean
          data:
            $ref: ./schemas/auth.yaml#/User
UserList:
  description: Daftar user
  content:
    application/json:
      schema:
        type: object
        properties:
          ok:
            type: boolean
          data:
            type: array
            items:
              $ref: ./schemas/auth.yaml#/User
          metadata:
            $ref: ./schemas/common.yaml#/CursorMeta
